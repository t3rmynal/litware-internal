name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "версия релиза"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}-${{ inputs.version || 'tag' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve Tag
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.version }}"
            if (-not $tag.StartsWith("v")) {
              $tag = "v$tag"
            }
          } else {
            $tag = "${{ github.ref_name }}"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create Tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.meta.outputs.tag }}';
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              core.info(`Tag ${tag} already exists`);
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              core.info(`Created tag ${tag} at ${context.sha}`);
            }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL
        run: msbuild litware-dll/litware-dll.vcxproj /p:Configuration=Release /p:Platform=x64 /m

      - name: Write SHA256
        shell: pwsh
        run: |
          $dll = "litware-dll/bin/Release/litware-dll.dll"
          $hash = (Get-FileHash $dll -Algorithm SHA256).Hash.ToLower()
          "$hash *litware-dll.dll" | Set-Content "litware-dll/bin/Release/litware-dll.dll.sha256" -NoNewline

      - name: Delete Existing Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.meta.outputs.tag }}';
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Deleting existing release ${release.id} for ${tag}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for ${tag}`);
                return;
              }
              throw error;
            }

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Litware ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            litware-dll/bin/Release/litware-dll.dll
            litware-dll/bin/Release/litware-dll.dll.sha256
