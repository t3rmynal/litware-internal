name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL
        run: msbuild litware-dll/litware-dll.vcxproj /p:Configuration=Release /p:Platform=x64 /m

      - name: Delete Existing Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Deleting existing release ${release.id} for ${tag}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for ${tag}`);
                return;
              }
              throw error;
            }

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: Litware ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            litware-dll/bin/Release/litware-dll.dll
